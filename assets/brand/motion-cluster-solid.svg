<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="currentColor" aria-hidden="true">
  <!-- Motion Medical cluster pattern: four overlapping rounded crosses.
       Each cross is 100×100, arranged in a 2×2 grid with overlap. -->
  <g transform="translate(0,0)">
    <rect x="40" y="10" width="20" height="80" rx="10" ry="10"/>
    <rect x="10" y="40" width="80" height="20" rx="10" ry="10"/>
  </g>
  <g transform="translate(110,30)">
    <rect x="40" y="10" width="20" height="80" rx="10" ry="10"/>
    <rect x="10" y="40" width="80" height="20" rx="10" ry="10"/>
  </g>
  <g transform="translate(40,100)">
    <rect x="40" y="10" width="20" height="80" rx="10" ry="10"/>
    <rect x="10" y="40" width="80" height="20" rx="10" ry="10"/>
  </g>
  <g transform="translate(140,130)">
    <rect x="40" y="10" width="20" height="80" rx="10" ry="10"/>
    <rect x="10" y="40" width="80" height="20" rx="10" ry="10"/>
  </g>
</svg>
